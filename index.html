<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Investment Calculator</h1>
      <p class="subtitle">Project your portfolio growth with monthly contributions</p>
    </header>

    <div class="layout"><section class="card controls" aria-label="Investment parameters">
      <div class="control-group">
        <label id="currencyLabel">Currency</label>
        <div class="currency-switcher" role="radiogroup" aria-labelledby="currencyLabel">
          <button type="button" class="currency-option" data-currency="PLN" role="radio" aria-checked="false">PLN</button>
          <button type="button" class="currency-option is-active" data-currency="EUR" role="radio" aria-checked="true">EUR</button>
          <button type="button" class="currency-option" data-currency="USD" role="radio" aria-checked="false">USD</button>
        </div>
      </div>

      <div class="control-group">
        <label for="startDate">Start date</label>
        <input type="month" id="startDate" name="startDate">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label for="currentBalance">Current balance</label>
          <span id="currentBalanceValue" class="value-readout" aria-live="polite">€0</span>
        </div>
        <input type="range" id="currentBalance" min="0" max="500000" step="500" value="0">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label for="monthlyBudget">Monthly budget</label>
          <span id="monthlyBudgetValue" class="value-readout" aria-live="polite">€500</span>
        </div>
        <input type="range" id="monthlyBudget" min="0" max="10000" step="50" value="500">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label for="yearlyGrowth">Average yearly stock growth</label>
          <span id="yearlyGrowthValue" class="value-readout" aria-live="polite">7.0%</span>
        </div>
        <input type="range" id="yearlyGrowth" min="0" max="100" step="0.5" value="7">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label for="yearlyTax">Yearly tax</label>
          <span id="yearlyTaxValue" class="value-readout" aria-live="polite">0%</span>
        </div>
        <input type="range" id="yearlyTax" min="0" max="50" step="1" value="0">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label for="yearsToInvest">Years to invest</label>
          <span id="yearsToInvestValue" class="value-readout" aria-live="polite">10 years</span>
        </div>
        <input type="range" id="yearsToInvest" min="1" max="40" step="1" value="10">
      </div>
    </section><section class="card output" aria-label="Projection results">
      <dl class="summary">
        <div class="summary-item">
          <dt>Total contributed</dt>
          <dd id="totalContributed">—</dd>
        </div>
        <div class="summary-item summary-item--gain">
          <dt>Net gain</dt>
          <dd id="netGain">—</dd>
        </div>
        <div class="summary-item summary-item--tax">
          <dt>Total tax paid</dt>
          <dd id="totalTaxPaid">—</dd>
        </div>
        <div class="summary-item summary-item--final">
          <dt>Final balance</dt>
          <dd id="finalBalance">—</dd>
        </div>
      </dl>

      <div id="chartPlaceholder" class="chart-placeholder hidden" role="status">
        Enter valid parameters to see your projection.
      </div>
      <div class="chart-wrapper">
        <canvas id="balanceChart" aria-label="Projected balance over time"></canvas>
      </div>

      <dl class="summary summary--below-chart">
        <div class="summary-item">
          <dt>Monthly income after investing</dt>
          <dd id="monthlyIncomeAfterInvesting">—</dd>
        </div>
      </dl>
    </section></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
